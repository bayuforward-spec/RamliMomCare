name: Deploy to GitHub Pages

# Men-deploy konten statis (index.html, gawatdarurat.html) ke GitHub Pages
# setiap ada push ke main, atau dijalankan manual dari tab Actions.

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Izin yang dibutuhkan job deploy untuk menerbitkan ke Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deploy Pages berjalan pada satu waktu; tidak membatalkan
# deploy yang sedang berjalan agar penerbitan selesai utuh.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Terbitkan seluruh isi repo (root) sebagai situs statis.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
