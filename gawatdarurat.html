        function renderApp() {
            const el = document.getElementById('app');
            let body = '';
            if (state.view === 'home') body = renderHome();
            else if (state.view === 'kondisi') body = renderKondisiDetail();
            else if (state.view === 'kalkulator') body = renderKalkulator();
            else if (state.view === 'triase') body = renderTriase();
            else if (state.view === 'rujukan') body = renderRujukan();
            el.innerHTML = `${renderNavbar()}${state.showSettings ? renderSettings() : ''}
                <main class="max-w-3xl mx-auto px-4 pb-28 pt-4">${body}</main>${renderBottomNav()}${renderDisclaimer()}`;
        }
        function go(view, kondisiId) {
            state.view = view; if (kondisiId !== undefined) state.kondisiId = kondisiId;
            renderApp(); try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
        }
        window.go = go;
        function reRender() {
            const y = window.scrollY; renderApp(); window.scrollTo(0, y);
        }
        // Re-render while keeping focus/caret on a live text field (search, contact edits).
        function reRenderKeepFocus() {
            const a = document.activeElement;
            const id = a && a.id, pos = a && typeof a.selectionStart === 'number' ? a.selectionStart : null;
            reRender();
            if (id) {
                const el = document.getElementById(id);
                if (el) { el.focus(); if (pos !== null) { try { el.setSelectionRange(pos, pos); } catch (e) {} } }
            }
        }
        window.setSearch = (v) => { state.search = v; reRenderKeepFocus(); };

                    ${state.search ? `<button onclick="setSearch('')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-circle-xmark"></i></button>` : ''}

                ${cats.map(catKey => {

                            ${list.map(k => `
                            <button onclick="go('kondisi','${k.id}')" class="w-full text-left bg-white rounded-xl p-3.5 border border-slate-100 shadow-sm hover:shadow-md hover:border-${cat.warna}-200 transition-all flex items-center gap-3">
                                <div class="w-11 h-11 rounded-lg bg-${cat.warna}-50 flex items-center justify-center shrink-0">
                                    <i class="fa-solid ${cat.ikon} text-${cat.warna}-500"></i>

                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="font-bold text-slate-800 text-[15px]">${k.nama}</span>

                                    </div>
                                    <div class="text-xs text-slate-500 truncate">${k.ringkas}</div>
                                </div>
                                <i class="fa-solid fa-chevron-right text-slate-300 text-sm"></i>

        }

        // ---------- Detail kondisi ----------
        function renderKondisiDetail() {
            const k = KONDISI.find(x => x.id === state.kondisiId);
            if (!k) return renderHome();
            const cat = KATEGORI[k.kategori];
            const cl = state.checklist[k.id] || {};
            const done = Object.values(cl).filter(Boolean).length;
            const pct = k.langkah.length ? Math.round(done / k.langkah.length * 100) : 0;
            return `
            <div class="fade-up">
                <button onclick="go('home')" class="text-slate-500 text-sm mb-3 flex items-center gap-1.5 no-print"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-5 mb-4">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-${cat.warna}-100 text-${cat.warna}-700">${cat.label}</span>
                        ${gawatBadge(k.gawat)}
                        <span class="text-[10px] text-slate-400 ml-auto">PPK Obgyn RSHS 2015 · hal. ${k.hal}</span>
                    </div>
                    <h1 class="font-extrabold text-xl text-slate-800">${k.nama}</h1>
                    <p class="text-sm text-slate-600 mt-2 leading-relaxed">${k.definisi}</p>
                </div>

                ${sectionCard('fa-list-check', 'red', 'Langkah Tindakan',
                    `<div class="mb-3">
                        <div class="flex items-center justify-between text-xs mb-1">
                            <span class="text-slate-500">Progres checklist</span>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-red-600">${done}/${k.langkah.length}</span>
                                ${done ? `<button onclick="resetChecklist('${k.id}')" class="text-slate-400 hover:text-red-500 no-print" title="Reset checklist"><i class="fa-solid fa-rotate-left"></i></button>` : ''}
                            </div>
                        </div>
                        <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-red-500 transition-all" style="width:${pct}%"></div></div>
                    </div>
                    <div class="space-y-2">
                        ${k.langkah.map((s, i) => {
                            const on = !!cl[i];
                            return `<button onclick="toggleStep('${k.id}',${i})" class="w-full text-left flex items-start gap-3 p-2.5 rounded-lg ${on ? 'bg-green-50' : 'bg-slate-50 hover:bg-slate-100'} transition-colors">
                                <div class="w-6 h-6 rounded-md shrink-0 flex items-center justify-center text-xs font-bold ${on ? 'bg-green-500 text-white' : 'bg-white border-2 border-slate-200 text-slate-400'}">${on ? '<i class="fa-solid fa-check"></i>' : (i + 1)}</div>
                                <span class="text-sm ${on ? 'text-green-800 line-through' : 'text-slate-700'} leading-snug">${s}</span>
                            </button>`;
                        }).join('')}
                    </div>`)}

                ${k.obat && k.obat.length ? sectionCard('fa-pills', 'blue', 'Obat & Dosis',
                    `<div class="space-y-2">
                        ${k.obat.map(o => `<div class="bg-blue-50 rounded-lg p-3">
                            <div class="font-bold text-blue-800 text-sm">${o.n}</div>
                            <div class="text-sm text-slate-700 mt-0.5">${o.d}</div>
                            <div class="text-xs text-blue-600 mt-0.5"><i class="fa-solid fa-syringe mr-1"></i>${o.c}</div>
                        </div>`).join('')}
                    </div>
                    <button onclick="go('kalkulator')" class="mt-3 text-xs font-semibold text-blue-600 flex items-center gap-1.5"><i class="fa-solid fa-calculator"></i> Buka Kalkulator Dosis</button>`) : ''}

                ${sectionCard('fa-stethoscope', 'purple', 'Diagnosis / Tanda',
                    `<ul class="space-y-1.5">${k.diagnosis.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-purple-400"></i><span>${d}</span></li>`).join('')}</ul>`)}

                ${sectionCard('fa-flask', 'teal', 'Pemeriksaan Penunjang',
                    `<ul class="space-y-1.5">${k.penunjang.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-teal-400"></i><span>${d}</span></li>`).join('')}</ul>`)}

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    ${sectionCard('fa-triangle-exclamation', 'amber', 'Penyulit',
                        `<div class="flex flex-wrap gap-1.5">${k.penyulit.map(p => `<span class="px-2 py-1 rounded-md bg-amber-50 text-amber-700 text-xs font-medium">${p}</span>`).join('')}</div>`)}
                    ${sectionCard('fa-hospital-user', 'red', 'Konsultasi / Rujukan',
                        `<div class="flex flex-wrap gap-1.5">${k.rujukan.map(p => `<span class="px-2 py-1 rounded-md bg-red-50 text-red-700 text-xs font-medium">${p}</span>`).join('')}</div>
                        <button onclick="go('rujukan')" class="mt-3 text-xs font-semibold text-red-600 flex items-center gap-1.5"><i class="fa-solid fa-phone-volume"></i> Checklist Rujukan (BAKSOKUDA)</button>`)}
                </div>

                <div class="flex gap-2 mt-4 no-print">
                    <button onclick="startTriaseFrom('${k.id}')" class="flex-1 bg-slate-800 text-white rounded-xl py-3 font-semibold text-sm flex items-center justify-center gap-2"><i class="fa-solid fa-robot"></i> Tanya RAMLI</button>
                    <button onclick="window.print()" class="px-4 bg-white border border-slate-200 text-slate-600 rounded-xl py-3 font-semibold text-sm"><i class="fa-solid fa-print"></i></button>
                </div>
            </div>`;
        }
        function sectionCard(icon, color, title, inner) {
            return `<div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-3">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-7 h-7 rounded-lg bg-${color}-50 flex items-center justify-center"><i class="fa-solid ${icon} text-${color}-500 text-sm"></i></div>
                    <h3 class="font-bold text-slate-700 text-sm">${title}</h3>
                </div>${inner}</div>`;
        }
        window.toggleStep = (id, i) => {
            state.checklist[id] = state.checklist[id] || {};
            state.checklist[id][i] = !state.checklist[id][i];
            reRender();
        };
        window.resetChecklist = (id) => { state.checklist[id] = {}; reRender(); };
        window.startTriaseFrom = (id) => {
            const k = KONDISI.find(x => x.id === id);
            state.triaseKondisi = k ? k.nama : '';
            go('triase');
        };

        // ---------- Kalkulator ----------
        function renderKalkulator() {
            const tabs = [
                { k: 'mgso4', t: 'MgSO₄' },
                { k: 'antihipertensi', t: 'Antihipertensi' },
                { k: 'oksitosin', t: 'Uterotonika' },
                { k: 'darah', t: 'Darah & Syok' },
                { k: 'steroid', t: 'Steroid Paru' },
                { k: 'tokolitik', t: 'Tokolitik' }
            ];
            return `
            <div class="fade-up">
                <h1 class="font-extrabold text-xl text-slate-800 mb-1">Kalkulator & Dosis</h1>
                <p class="text-sm text-slate-500 mb-4">Berbasis PPK Obgyn RSHS 2015. Verifikasi selalu dengan penilaian klinis.</p>
                <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-2 mb-4 no-print">
                    ${tabs.map(t => `<button onclick="setCalc('${t.k}')" class="px-3.5 py-2 rounded-lg text-sm font-semibold whitespace-nowrap ${state.calc === t.k ? 'bg-red-600 text-white' : 'bg-white text-slate-500 border border-slate-200'}">${t.t}</button>`).join('')}
                </div>
                ${calcBody()}
            </div>`;
        }
        window.setCalc = (k) => { state.calc = k; reRender(); };

        function calcBody() {
            if (state.calc === 'mgso4') return calcMgSO4();
            if (state.calc === 'antihipertensi') return calcAntihipertensi();
            if (state.calc === 'oksitosin') return calcOksitosin();
            if (state.calc === 'darah') return calcDarah();
            if (state.calc === 'steroid') return calcSteroid();
            if (state.calc === 'tokolitik') return calcTokolitik();
            return '';
        }
        function doseCard(title, rows) {
            return `<div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-3">
                <h3 class="font-bold text-slate-800 mb-3">${title}</h3>
                <div class="space-y-2">${rows.map(r => `
                    <div class="flex items-start gap-3 bg-slate-50 rounded-lg p-3">
                        <div class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center shrink-0"><i class="fa-solid ${r.i || 'fa-syringe'} text-sm"></i></div>
                        <div><div class="font-semibold text-slate-800 text-sm">${r.t}</div><div class="text-sm text-slate-600">${r.d}</div></div>
                    </div>`).join('')}</div></div>`;
        }
        function calcMgSO4() {
            return `
            ${doseCard('MgSO₄ — Preeklampsia Berat / Eklampsia', [
                { i: 'fa-bolt', t: 'Dosis awal (loading)', d: '4 g (10 cc MgSO₄ 40%) dalam 100 cc RL, IV 15–20 menit (infusion pump).' },
                { i: 'fa-clock', t: 'Dosis pemeliharaan', d: '10 g dalam 500 cc RL, kecepatan 1–2 g/jam (20–30 tpm).' },
                { i: 'fa-repeat', t: 'Kejang ulang (eklampsia)', d: '2 g MgSO₄ 40% IV pelan (2 menit), min 20 menit dari dosis terakhir. Tambahan 2 g HANYA sekali.' },
                { i: 'fa-brain', t: 'Neuroproteksi (preterm)', d: 'Loading 4 g/100cc RL (15–20 mnt) → rumatan 8 g/500cc RL, 20 tpm selama 4 jam.' }
            ])}
            <div class="rounded-2xl bg-green-50 border border-green-200 p-4 mb-3">
                <h3 class="font-bold text-green-800 mb-2 flex items-center gap-2"><i class="fa-solid fa-clipboard-check"></i> Syarat Pemberian (cek tiap dosis)</h3>
                <ul class="space-y-1.5 text-sm text-green-900">
                    <li><i class="fa-solid fa-check text-green-600 mr-2"></i>Refleks patella (+) kuat</li>
                    <li><i class="fa-solid fa-check text-green-600 mr-2"></i>Frekuensi napas >16 ×/menit</li>
                    <li><i class="fa-solid fa-check text-green-600 mr-2"></i>Produksi urin >30 cc/jam (0,5 cc/kgBB/jam)</li>
                    <li><i class="fa-solid fa-check text-green-600 mr-2"></i>Antidotum tersedia: <b>Kalsium glukonas 10%</b> (1 g/10 cc) IV 3–5 menit</li>
                </ul>
            </div>
            <div class="rounded-2xl bg-red-50 border border-red-200 p-4">
                <h3 class="font-bold text-red-800 mb-2 flex items-center gap-2"><i class="fa-solid fa-hand"></i> Hentikan MgSO₄ bila</h3>
                <ul class="space-y-1.5 text-sm text-red-900">
                    <li>• Ada tanda intoksikasi</li>
                    <li>• Setelah 24 jam pascasalin</li>
                    <li>• Dalam 6 jam pascasalin sudah normotensif</li>
                </ul>
            </div>`;
        }
        function calcAntihipertensi() {
            return `
            <div class="rounded-2xl bg-amber-50 border border-amber-200 p-4 mb-3">
                <p class="text-sm text-amber-900"><i class="fa-solid fa-circle-info mr-1"></i> Indikasi antihipertensi: <b>sistolik ≥160</b> atau <b>diastolik ≥110 mmHg</b>.</p>
            </div>
            ${doseCard('Pilihan Antihipertensi', [
                { i: 'fa-pills', t: 'Nifedipin', d: '10 mg PO, dapat diulang tiap 30 menit (maks 120 mg/24 jam) sampai MABP ↓20%. Rumatan 3×10 mg. <b class="text-red-600">JANGAN sublingual.</b>' },
                { i: 'fa-droplet', t: 'Nikardipin', d: 'Bila TD ≥180/110 (hipertensi emergensi): 1 amp 10 mg dalam 50 cc /jam, atau 2 amp 10 mg dalam 100 cc, mikrodrip. Pelarut BUKAN RL / Bikarbonat natrikus.' }
            ])}`;
        }
        function calcOksitosin() {
            const tpm = state.oksTetes;
            return `
            ${doseCard('Uterotonika — Atonia Uteri (HPP)', [
                { i: 'fa-droplet', t: 'Oksitosin', d: '10 IU dalam RL 500 cc, tetesan cepat (dapat s/d 3 liter dengan 40 tpm).' },
                { i: 'fa-syringe', t: 'Ergometrin', d: '0,2 mg IV/IM. Ulang 1× setelah 15 menit; bila perlu tiap 2–4 jam (maks 1 mg / 5 dosis).' },
                { i: 'fa-capsules', t: 'Misoprostol', d: '400 µg per rektal/oral. Ulang tiap 2–4 jam (maks 1200 µg / 3 dosis).' }
            ])}
            ${doseCard('Uterotonika lain (per kondisi)', [
                { i: 'fa-droplet', t: 'Inversio uteri', d: 'Oksitosin 20 IU dalam Dextrose 5%, ≥24 jam (pasca reposisi).' },
                { i: 'fa-pills', t: 'Abortus inkomplit', d: 'Metilergometrin 3×0,125 mg tab.' }
            ])}
            <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4">
                <h3 class="font-bold text-slate-800 mb-2">Bantu Hitung Tetesan</h3>
                <p class="text-xs text-slate-500 mb-3">Faktor tetes makro 20 gtt/mL. Volume dari tetes/menit → mL/jam.</p>
                <label class="text-sm text-slate-600">Tetes/menit (tpm)</label>
                <input type="number" value="${tpm}" oninput="setOks(this.value)" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-200 focus:border-red-400 outline-none">
                <div class="mt-3 bg-red-50 rounded-lg p-3 text-center">
                    <div class="text-2xl font-extrabold text-red-600">${(tpm * 3).toFixed(0)} mL/jam</div>
                    <div class="text-xs text-slate-500">≈ ${(tpm * 3 / 60).toFixed(1)} mL/menit (makro 20 gtt/mL)</div>
                </div>
            </div>`;
        }
        window.setOks = (v) => { state.oksTetes = parseFloat(v) || 0; reRender(); };
        function calcDarah() {
            const loss = state.eblLoss, mode = state.eblMode;
            const thresh = mode === 'pervaginam' ? 500 : 1000;
            const isHPP = loss > thresh;
            return `
            ${doseCard('Definisi Perdarahan Pascasalin (HPP)', [
                { i: 'fa-droplet', t: 'Pervaginam', d: '>500 cc.' },
                { i: 'fa-droplet', t: 'Perabdominam (SC)', d: '>1000 cc.' },
                { i: 'fa-clock', t: 'Dini (primer) / Lambat (sekunder)', d: '<24 jam pertama / >24 jam.' }
            ])}
            <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-3">
                <h3 class="font-bold text-slate-800 mb-3">Cek Ambang HPP</h3>
                <label class="text-sm text-slate-600">Estimasi kehilangan darah (cc)</label>
                <input type="number" value="${loss}" oninput="setEblLoss(this.value)" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-200 focus:border-red-400 outline-none">
                <div class="flex gap-2 mt-2">
                    ${['pervaginam', 'perabdominam'].map(m => `<button onclick="setEblMode('${m}')" class="flex-1 py-2 rounded-lg text-sm font-semibold ${mode === m ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-500'}">${m === 'pervaginam' ? 'Pervaginam' : 'Perabdominam'}</button>`).join('')}
                </div>
                <div class="mt-3 rounded-lg p-3 text-center ${isHPP ? 'bg-red-100' : 'bg-green-100'}">
                    <div class="font-extrabold ${isHPP ? 'text-red-700' : 'text-green-700'}">${isHPP ? '⚠️ MEMENUHI KRITERIA HPP' : '✓ Belum memenuhi kriteria HPP'}</div>
                    <div class="text-xs text-slate-600 mt-0.5">Ambang untuk ${mode}: >${thresh} cc</div>
                </div>
            </div>
            <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4">
                <h3 class="font-bold text-slate-800 mb-2">Bed Side Clotting Test</h3>
                <p class="text-xs text-slate-500 mb-2">5 cc darah vena dalam tabung + 1 lidi. Amati bekuan pada menit 6, 8, 10.</p>
                <div class="space-y-2 text-sm">
                    <div class="bg-green-50 rounded-lg p-2.5 text-green-800">Bekuan <b>&lt;10 menit</b> & tidak mudah hancur → fibrinogen >200 mg/dL (pembekuan baik).</div>
                    <div class="bg-red-50 rounded-lg p-2.5 text-red-800">Bekuan <b>&gt;10 menit</b> & mudah hancur → gangguan pembekuan (fibrinogen <200 mg/dL).</div>
                </div>
            </div>`;
        }
        window.setEblLoss = (v) => { state.eblLoss = parseFloat(v) || 0; reRender(); };
        window.setEblMode = (m) => { state.eblMode = m; reRender(); };
        function calcSteroid() {
            return `
            <div class="rounded-2xl bg-sky-50 border border-sky-200 p-4 mb-3">
                <p class="text-sm text-sky-900"><i class="fa-solid fa-lungs mr-1"></i> Pematangan paru diberikan pada UK <b>24–34 minggu</b>.</p>
            </div>
            ${doseCard('Kortikosteroid Pematangan Paru', [
                { i: 'fa-syringe', t: 'Deksametason', d: '6 mg IM tiap 12 jam sampai 4 dosis.' },
                { i: 'fa-syringe', t: 'Betametason', d: '12 mg IM sampai 2 dosis, interval 24 jam.' }
            ])}
            ${doseCard('Alternatif (solusio ringan / HELLP)', [
                { i: 'fa-syringe', t: 'Deksametason (solusio ringan)', d: '20 mg/48 jam (5 mg ×4 dosis).' },
                { i: 'fa-syringe', t: 'Betametason (solusio ringan)', d: '24 mg/48 jam (2 dosis).' },
                { i: 'fa-syringe', t: 'HELLP', d: 'Deksametason 2×5 mg (2 hari) / Betametason 1×12 mg (2 hari).' }
            ])}`;
        }
        function calcTokolitik() {
            return `
            <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-3">
                <h3 class="font-bold text-slate-800 mb-2">Kriteria & Kontraindikasi</h3>
                <p class="text-sm text-slate-600 mb-2"><b>Kriteria:</b> UK 24–34 mgg · ≥2 kontraksi/15 mnt (KTG) · pengaruh jelas ke serviks · pembukaan <3 cm · tanpa kontraindikasi β-agonis.</p>
                <p class="text-sm text-red-700"><b>Kontraindikasi:</b> solusio plasenta, infeksi intrauterin, febris tak jelas, PJT, penyakit jantung, hipertensi dalam kehamilan, penyakit paru, hipertiroid, diabetes melitus.</p>
            </div>
            ${doseCard('Jenis, Dosis & Cara', [
                { i: 'fa-droplet', t: 'Salbutamol', d: '10 mg dalam NaCl/RL. Mulai 10 tpm, ↑ 10 tpm tiap 30 mnt sampai kontraksi berhenti / nadi >120. Rumatan PO 3×4 mg, 7 hari.' },
                { i: 'fa-droplet', t: 'Isoksuprin', d: 'Infus 0,25–0,5 mg/mnt (bisa ↑ 1 mg/mnt). Lanjut 10 mg IM/3–6 jam (12–24 jam), lalu 10–20 mg tab tiap 6 jam, 3 hari.' },
                { i: 'fa-pills', t: 'Nifedipin', d: '3×20 mg PO/hari sampai kontraksi berhenti. Awasi hipotensi.' },
                { i: 'fa-syringe', t: 'Terbutalin', d: '250 µg IV → infus 10 µg/mnt. Pertahankan 8 jam, lalu SC 250 µg/jam (24 jam), lanjut PO 2,5 µg/4–6 jam.' }
            ])}
            <div class="rounded-2xl bg-amber-50 border border-amber-200 p-3 text-sm text-amber-900"><i class="fa-solid fa-eye mr-1"></i> Awasi ketat: KU, nadi, napas, TD, DJJ, kontraksi. Waspada dekompensasi kordis / edema paru.</div>`;
        }

        // ---------- Triase AI ----------
        function renderTriase() {
            const opts = KONDISI.map(k => `<option value="${k.nama}" ${state.triaseKondisi === k.nama ? 'selected' : ''}>${k.nama}</option>`).join('');
            return `
            <div class="fade-up">
                <div class="rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 text-white p-5 mb-4">
                    <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-robot"></i><h1 class="font-extrabold text-lg">Triase RAMLI</h1></div>
                    <p class="text-slate-300 text-sm">Masukkan temuan klinis singkat. RAMLI memberi kemungkinan diagnosis, tingkat kegawatan, dan langkah segera berbasis protap. <b>Bukan pengganti penilaian klinis.</b></p>
                </div>
                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-4">
                    <label class="text-sm font-semibold text-slate-600">Dugaan kondisi (opsional)</label>
                    <select onchange="setTriaseKondisi(this.value)" class="w-full mt-1 mb-3 px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-red-400 bg-white">
                        <option value="">— Biarkan RAMLI menilai —</option>${opts}
                    </select>
                    <label class="text-sm font-semibold text-slate-600">Temuan klinis / gejala</label>
                    <textarea id="triaseInput" oninput="setTriaseInput(this.value)" rows="5" placeholder="Contoh: G3P2A0 hamil 34 mgg, TD 170/115, nyeri kepala hebat, penglihatan kabur, kaki bengkak, proteinuria +3..." class="w-full mt-1 px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-red-400 text-sm">${state.triaseInput}</textarea>
                    <button onclick="runTriase()" ${state.triaseLoading ? 'disabled' : ''} class="w-full mt-3 bg-red-600 hover:bg-red-700 disabled:opacity-60 text-white rounded-xl py-3 font-bold flex items-center justify-center gap-2">
                        ${state.triaseLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> RAMLI menganalisis...' : '<i class="fa-solid fa-bolt"></i> Analisis Triase'}
                    </button>
                </div>
                ${state.triaseError ? `<div class="rounded-2xl bg-amber-50 border border-amber-200 p-4 text-sm text-amber-900 mb-4"><i class="fa-solid fa-triangle-exclamation mr-1"></i> AI RAMLI belum aktif atau gagal terhubung. Anda tetap dapat memakai panduan kondisi & kalkulator secara offline. Untuk mengaktifkan AI, isi API key via ⚙ atau pastikan proxy terhubung.</div>` : ''}
                ${state.triaseResult ? renderTriaseResult(state.triaseResult) : ''}
            </div>`;
        }
        window.setTriaseInput = (v) => { state.triaseInput = v; };
        window.setTriaseKondisi = (v) => { state.triaseKondisi = v; };
        function renderTriaseResult(r) {
            const level = (r.kegawatan || '').toLowerCase();
            const color = level.includes('sangat') || level.includes('tinggi') ? 'red' : level.includes('sedang') ? 'amber' : 'green';
            return `
            <div class="fade-up space-y-3">
                <div class="rounded-2xl bg-${color}-50 border border-${color}-200 p-4">
                    <div class="text-xs font-bold text-${color}-600 uppercase tracking-wide">Tingkat Kegawatan</div>
                    <div class="text-xl font-extrabold text-${color}-700">${r.kegawatan || '-'}</div>
                    ${r.ringkasan ? `<p class="text-sm text-slate-700 mt-1">${r.ringkasan}</p>` : ''}
                </div>
                ${Array.isArray(r.kemungkinan) && r.kemungkinan.length ? sectionCard('fa-stethoscope', 'purple', 'Kemungkinan Diagnosis',
                    `<ul class="space-y-1.5">${r.kemungkinan.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-purple-400"></i><span>${d}</span></li>`).join('')}</ul>`) : ''}
                ${Array.isArray(r.langkahSegera) && r.langkahSegera.length ? sectionCard('fa-list-check', 'red', 'Langkah Segera',
                    `<ol class="space-y-2">${r.langkahSegera.map((s, i) => `<li class="flex gap-3 text-sm text-slate-700"><span class="w-6 h-6 rounded-md bg-red-100 text-red-600 font-bold text-xs flex items-center justify-center shrink-0">${i + 1}</span><span>${s}</span></li>`).join('')}</ol>`) : ''}
                ${r.rujukan ? sectionCard('fa-hospital-user', 'red', 'Rujukan', `<p class="text-sm text-slate-700">${r.rujukan}</p>`) : ''}
                <div class="text-[11px] text-slate-400 px-1">Saran AI berbasis PPK Obgyn RSHS 2015. Selalu konfirmasi dengan DPJP / penilaian klinis langsung.</div>
            </div>`;
        }
        function extractJSON(text) {
            if (!text) return null;
            let s = text.indexOf('{'), e = text.lastIndexOf('}');
            if (s === -1 || e === -1 || e < s) return null;
            try { return JSON.parse(text.slice(s, e + 1)); } catch (err) { return null; }
        }
        window.runTriase = async () => {
            if (!state.triaseInput.trim()) { return; }
            state.triaseLoading = true; state.triaseError = false; state.triaseResult = null; reRender();
            const kondisiRef = state.triaseKondisi ? KONDISI.find(k => k.nama === state.triaseKondisi) : null;
            const konteks = kondisiRef ? `\n\nProtap acuan (${kondisiRef.nama}):\nLangkah: ${kondisiRef.langkah.join(' | ')}\nObat: ${kondisiRef.obat.map(o => o.n + ' ' + o.d).join(' | ')}` : '';
            const systemPrompt = `Anda RAMLI, asisten triase kegawatdaruratan obstetri untuk TENAGA KESEHATAN. Konten berbasis Panduan Praktik Klinis (PPK) Obstetri & Ginekologi RSUP Dr. Hasan Sadikin Bandung 2015. Jawab HANYA dengan satu objek JSON valid tanpa teks lain, tanpa markdown. Bahasa Indonesia, ringkas, aksi-oriented, aman. Selalu tekankan stabilisasi (ABC), panggil bantuan, dan rujukan bila perlu. Jangan mengarang dosis di luar protap.
Struktur:
{
  "kegawatan": "Sangat Tinggi | Tinggi | Sedang | Rendah",
  "ringkasan": "1-2 kalimat penilaian",
  "kemungkinan": ["diagnosis banding 1", "diagnosis banding 2"],
  "langkahSegera": ["langkah 1", "langkah 2", "langkah 3"],
  "rujukan": "kriteria & tujuan rujukan singkat"
}`;
            const userQuery = `Temuan klinis: ${state.triaseInput}${state.triaseKondisi ? `\nDugaan klinisi: ${state.triaseKondisi}` : ''}${konteks}`;
            try {
                const _proxy = (typeof RAMLI_PROXY_URL === 'string' && RAMLI_PROXY_URL.trim()) ? RAMLI_PROXY_URL.trim() : '';
                const _endpoint = _proxy || "https://api.anthropic.com/v1/messages";
                const _headers = { "Content-Type": "application/json" };
                if (!_proxy) {
                    const _key = getStoredKey();
                    if (_key) { _headers["x-api-key"] = _key; _headers["anthropic-version"] = "2023-06-01"; _headers["anthropic-dangerous-direct-browser-access"] = "true"; }
                }
                const res = await fetch(_endpoint, {
                    method: "POST", headers: _headers,
                    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1200, system: systemPrompt, messages: [{ role: "user", content: userQuery }] })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
                const parsed = extractJSON(text);
                if (parsed) state.triaseResult = parsed; else state.triaseError = true;
            } catch (e) {
                console.error('Triase gagal:', e); state.triaseError = true;
            } finally {
                state.triaseLoading = false; reRender();
            }
        };

        // ---------- Rujukan ----------
        const BAKSOKUDA = [
            { h: 'B', t: 'Bidan/Nakes', d: 'Pastikan pasien didampingi tenaga kesehatan yang kompeten selama rujukan.' },
            { h: 'A', t: 'Alat', d: 'Bawa alat & bahan (resusitasi, oksigen, cairan, obat emergensi, partus set bila perlu).' },
            { h: 'K', t: 'Keluarga', d: 'Beri tahu keluarga kondisi & alasan rujukan; sertakan pendamping.' },
            { h: 'S', t: 'Surat', d: 'Surat rujukan berisi identitas, diagnosis, tindakan yang sudah diberikan, alasan rujukan.' },
            { h: 'O', t: 'Obat', d: 'Bawa obat-obatan esensial yang sedang/akan diperlukan selama perjalanan.' },
            { h: 'K', t: 'Kendaraan', d: 'Siapkan kendaraan/ambulans yang layak & siap pakai.' },
            { h: 'U', t: 'Uang', d: 'Pastikan ketersediaan biaya/administrasi (termasuk jaminan kesehatan).' },
            { h: 'D', t: 'Darah', d: 'Siapkan calon pendonor / informasi golongan darah bila risiko perdarahan.' },
            { h: 'A', t: 'Doa', d: 'Dukungan psikologis & spiritual untuk pasien dan keluarga.' }
        ];
        function renderRujukan() {
            return `
            <div class="fade-up">
                <h1 class="font-extrabold text-xl text-slate-800 mb-1">Stabilisasi & Rujukan</h1>
                <p class="text-sm text-slate-500 mb-4">Lakukan stabilisasi sebelum & selama rujukan. Rujuk optimal & tepat waktu.</p>

                <div class="rounded-2xl bg-red-600 text-white p-5 mb-4">
                    <h2 class="font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-heart-pulse"></i> Stabilisasi Awal (ABC)</h2>
                    <ul class="space-y-2 text-sm">
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Posisikan semi-ekstensi, bebaskan jalan napas.</li>
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Beri Oksigen bila perlu.</li>
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Pasang infus, resusitasi cairan; transfusi bila syok.</li>
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Tentukan ada syok atau tidak; kontrol sumber perdarahan.</li>
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Monitor tanda vital berkala.</li>
                        <li class="flex gap-2"><i class="fa-solid fa-circle-check mt-0.5"></i> Informed consent bila memungkinkan.</li>
                    </ul>
                </div>

                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-4">
                    <h2 class="font-bold text-slate-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-clipboard-list text-red-500"></i> Checklist Rujukan — BAKSOKUDA</h2>
                    <div class="space-y-2">
                        ${BAKSOKUDA.map((b, i) => `
                        <button onclick="toggleBaksokuda(${i})" class="w-full text-left flex items-start gap-3 p-2.5 rounded-lg ${state.checklist['baksokuda_' + i] ? 'bg-green-50' : 'bg-slate-50 hover:bg-slate-100'} transition-colors">
                            <div class="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center font-extrabold ${state.checklist['baksokuda_' + i] ? 'bg-green-500 text-white' : 'bg-red-100 text-red-600'}">${state.checklist['baksokuda_' + i] ? '<i class="fa-solid fa-check"></i>' : b.h}</div>
                            <div><div class="font-bold text-slate-800 text-sm">${b.t}</div><div class="text-xs text-slate-500">${b.d}</div></div>
                        </button>`).join('')}
                    </div>
                </div>

                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-phone text-red-500"></i> Kontak Darurat</h2>
                        <button onclick="toggleEditContacts()" class="text-xs font-semibold ${state.editContacts ? 'text-green-600' : 'text-red-600'} no-print">
                            <i class="fa-solid ${state.editContacts ? 'fa-check' : 'fa-pen'} mr-1"></i>${state.editContacts ? 'Selesai' : 'Edit nomor'}
                        </button>
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <a href="tel:119" class="flex items-center gap-3 bg-red-50 rounded-xl p-3 pulse-ring"><div class="w-11 h-11 rounded-lg bg-red-600 text-white flex items-center justify-center"><i class="fa-solid fa-truck-medical"></i></div><div><div class="font-bold text-red-700">119</div><div class="text-xs text-slate-500">Layanan Gawat Darurat Nasional</div></div></a>
                        ${state.contacts.map((c, i) => state.editContacts ? `
                            <div class="flex items-center gap-3 bg-slate-50 rounded-xl p-3">
                                <div class="w-11 h-11 rounded-lg bg-${c.warna}-500 text-white flex items-center justify-center shrink-0"><i class="fa-solid ${c.ikon}"></i></div>
                                <div class="flex-1 min-w-0">
                                    <input id="cLabel${i}" value="${(c.label || '').replace(/"/g, '&quot;')}" oninput="setContact(${i},'label',this.value)" placeholder="Nama faskes" class="w-full bg-white border border-slate-200 rounded-md px-2 py-1 text-sm font-semibold text-slate-800 outline-none focus:border-red-400 mb-1">
                                    <input id="cTel${i}" value="${(c.tel || '').replace(/"/g, '&quot;')}" oninput="setContact(${i},'tel',this.value)" placeholder="Nomor telepon" inputmode="tel" class="w-full bg-white border border-slate-200 rounded-md px-2 py-1 text-xs text-slate-600 outline-none focus:border-red-400">
                                </div>
                                <button onclick="removeContact(${i})" class="text-slate-300 hover:text-red-500 shrink-0"><i class="fa-solid fa-trash"></i></button>
                            </div>` : `
                            <a href="${c.tel ? 'tel:' + c.tel.replace(/\s/g, '') : 'javascript:void(0)'}" class="flex items-center gap-3 bg-slate-50 ${c.tel ? 'hover:bg-slate-100' : 'opacity-70'} rounded-xl p-3">
                                <div class="w-11 h-11 rounded-lg bg-${c.warna}-500 text-white flex items-center justify-center shrink-0"><i class="fa-solid ${c.ikon}"></i></div>
                                <div class="min-w-0"><div class="font-bold text-slate-700 truncate">${c.tel || '— belum diisi —'}</div><div class="text-xs text-slate-500 truncate">${c.label}</div></div>
                                ${c.tel ? '<i class="fa-solid fa-phone text-slate-300 ml-auto"></i>' : ''}
                            </a>`).join('')}
                    </div>
                    ${state.editContacts ? `<button onclick="addContact()" class="w-full mt-2 border-2 border-dashed border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-300 rounded-xl py-2.5 text-sm font-semibold no-print"><i class="fa-solid fa-plus mr-1"></i> Tambah kontak</button>` : ''}
                    <p class="text-[11px] text-slate-400 mt-2">Nomor tersimpan di perangkat ini (localStorage).</p>
                </div>
                <button onclick="window.print()" class="w-full bg-white border border-slate-200 text-slate-600 rounded-xl py-3 font-semibold text-sm no-print"><i class="fa-solid fa-print mr-1"></i> Cetak Checklist</button>
            </div>`;
        }
        function saveContacts() { safeStorage.set('ramli_contacts', JSON.stringify(state.contacts)); }
        window.toggleEditContacts = () => { state.editContacts = !state.editContacts; if (!state.editContacts) saveContacts(); reRender(); };
        window.setContact = (i, field, v) => { if (state.contacts[i]) { state.contacts[i][field] = v; saveContacts(); } };
        window.addContact = () => { state.contacts.push({ label: '', sub: '', tel: '', ikon: 'fa-phone', warna: 'slate' }); saveContacts(); reRenderKeepFocus(); };
        window.removeContact = (i) => { state.contacts.splice(i, 1); saveContacts(); reRender(); };
        window.toggleBaksokuda = (i) => { state.checklist['baksokuda_' + i] = !state.checklist['baksokuda_' + i]; reRender(); };

        // ---------- Settings (API key) ----------
        function toggleSettings() { state.showSettings = !state.showSettings; renderApp(); }
        window.toggleSettings = toggleSettings;
        function renderSettings() {
            const hasProxy = (typeof RAMLI_PROXY_URL === 'string' && RAMLI_PROXY_URL.trim());
            const key = getStoredKey();
            return `
            <div class="fixed inset-0 z-40 bg-black/40 flex items-end sm:items-center justify-center p-4 no-print" onclick="if(event.target===this)toggleSettings()">
                <div class="bg-white rounded-2xl w-full max-w-md p-5 fade-up">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-robot text-red-500"></i> Pengaturan AI RAMLI</h3>
                        <button onclick="toggleSettings()" class="text-slate-400"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    ${hasProxy ? `<div class="bg-green-50 text-green-800 text-sm rounded-lg p-3 mb-3"><i class="fa-solid fa-circle-check mr-1"></i> AI aktif via proxy — siap dipakai semua pengunjung tanpa API key.</div>` : `
                    <p class="text-sm text-slate-600 mb-2">Masukkan Anthropic API key (disimpan lokal di perangkat ini saja) untuk mengaktifkan Triase AI.</p>
                    <input id="apiKeyInput" type="password" value="${key}" placeholder="sk-ant-..." class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-red-400 text-sm mb-2">
                    <div class="flex gap-2">
                        <button onclick="saveKey()" class="flex-1 bg-red-600 text-white rounded-lg py-2.5 font-semibold text-sm">Simpan</button>
                        <button onclick="clearKey()" class="px-4 bg-slate-100 text-slate-600 rounded-lg py-2.5 font-semibold text-sm">Hapus</button>
                    </div>`}
                    ${state.keyNote ? `<div class="text-xs text-green-600 mt-2">${state.keyNote}</div>` : ''}
                    <div class="text-[11px] text-slate-400 mt-3 border-t border-slate-100 pt-3">Skoring, kalkulator, dan panduan tetap berfungsi penuh tanpa AI.</div>
                </div>
            </div>`;
        }
        window.saveKey = () => { const v = document.getElementById('apiKeyInput').value.trim(); if (v) { safeStorage.set('ramli_anthropic_key', v); state.keyNote = 'API key tersimpan.'; renderApp(); } };
        window.clearKey = () => { safeStorage.remove('ramli_anthropic_key'); state.keyNote = 'API key dihapus.'; renderApp(); };

        // ---------- Disclaimer footer ----------
        function renderDisclaimer() {
            return `<div class="max-w-3xl mx-auto px-4 pb-24 -mt-2">
                <div class="rounded-xl bg-slate-100 border border-slate-200 p-3 text-[11px] text-slate-500 leading-relaxed">
                    <b class="text-slate-600"><i class="fa-solid fa-circle-info"></i> Disclaimer:</b> Aplikasi ini adalah alat bantu keputusan klinis untuk tenaga kesehatan, berbasis Panduan Praktik Klinis (PPK) Obstetri & Ginekologi RSUP Dr. Hasan Sadikin Bandung 2015. BUKAN pengganti penilaian klinis, pemeriksaan langsung, atau kebijakan/protap institusi Anda. Pada keadaan mengancam jiwa: panggil bantuan, stabilisasi, dan rujuk segera.
                </div>
            </div>`;
        }

        // init
        renderApp();
    </script>
</body>
</html>
