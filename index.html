<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dr. Bayu SpOG Personal Momscare · Claude Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        h1,h2,h3,h4,h5,p,span,li,a,button,label,div,td,th { overflow-wrap: break-word; }
        .clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        #fontCtl button:active { transform: scale(.92); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp .35s ease both; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
        }

        /* Print / Save as PDF */
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-area { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; }
            @page { margin: 1.5cm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-rose-50 text-gray-800">
    <div id="app"></div>

    <script>
        /* =========================================================
           dr. Bayu SpOG Personal Momscare — Claude Edition (Single Page)
           - Semua input dalam satu halaman, tanpa langkah/klik next
           - AI "Asisten AI dr. Bayu" ditenagai Claude (Anthropic API)
           - Suara via mesin suara bawaan browser
           - Riwayat pakai localStorage bila tersedia, fallback memori
        ========================================================= */

        /* ====================================================================
           OPSIONAL — PROXY CLOUDFLARE WORKERS (agar AI aktif untuk SEMUA pengunjung)
           Tempel URL Worker Anda di antara tanda kutip di bawah ini, contoh:
           const RAMLI_PROXY_URL = "https://ramli-ai.namaanda.workers.dev";

           - Jika DIISI : Asisten AI dr. Bayu otomatis menyala untuk semua orang, tanpa perlu
                          memasukkan API key di browser (kunci aman di Cloudflare).
           - Jika KOSONG: AI hanya aktif bila pengguna memasukkan API key sendiri
                          lewat menu ⚙ (untuk perangkat pribadi), atau di lingkungan
                          Claude.ai. Skoring & suara tetap jalan tanpa AI.
        ==================================================================== */
        const RAMLI_PROXY_URL = "https://withered-fire-1b27.bayuforward.workers.dev";

        const memStore = {};
        const safeStorage = {
            get(key) { try { return localStorage.getItem(key); } catch (e) { return key in memStore ? memStore[key] : null; } },
            set(key, val) { try { localStorage.setItem(key, val); } catch (e) { memStore[key] = val; } },
            remove(key) { try { localStorage.removeItem(key); } catch (e) { delete memStore[key]; } }
        };
        function getStoredKey() {
            try { const k = safeStorage.get('rshb_anthropic_key'); return k && k.trim() ? k.trim() : ''; }
            catch (e) { return ''; }
        }
        function loadHistory() {
            try { return JSON.parse(safeStorage.get('rshb_momscare_history')) || []; }
            catch (e) { return []; }
        }

        let state = {
            isAnalyzing: false,
            aiAnalysis: null,
            aiError: false,
            isSpeaking: false,
            voiceNote: '',
            isSharedView: false,
            copySuccess: '',
            generatedLink: '',
            history: loadHistory(),
            showHistory: false,
            showSettings: false,
            keyNote: '',
            saveSuccess: false,
            results: null
        };

        let formData = {
            nama: '', usia: 28, tinggiBadan: 155, beratBadanSebelum: 55, beratBadanSekarang: 58, mingguKehamilan: 12,
            hamilKe: 1, jarakKehamilan: 0, riwayatObstetri: [], riwayatKeluarga: [],
            pekerjaan: 'Kantoran', stresPekerjaan: 'Sedang', kondisiMedis: [], kondisiJanin: [],
            tekananDarah: 'Normal', hasilUsg: 'Sesuai Usia Kehamilan', usgCRL: '', usgNT: '', usgDJJ: ''
        };

        // ---- Render helpers ----
        function renderApp() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                ${renderNavbar()}
                <main class="max-w-4xl mx-auto p-4 md:p-8 print-area">
                    ${state.showSettings ? renderSettings() : state.showHistory ? renderHistory() : `
                        ${!state.isSharedView ? renderForm() : ''}
                        ${state.results ? `<div id="hasil">${renderResults()}</div>` : ''}
                    `}
                    <footer class="text-center text-[11px] text-gray-400 mt-8 no-print">
                        dr. Bayu SpOG Personal Momscare · Claude Edition · Alat bantu edukasi, bukan pengganti pemeriksaan dokter.
                    </footer>
                </main>
            `;
        }
        function reRenderKeepScroll() {
            const y = window.scrollY;
            renderApp();
            requestAnimationFrame(() => window.scrollTo(0, y));
        }
        function scrollToTop() { try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); } }
        function scrollToHasil() {
            const el = document.getElementById('hasil');
            if (el) { try { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) { el.scrollIntoView(); } }
        }

        // ---- Field updates ----
        window.updateField = (key, val, type = 'text') => {
            if (type === 'int') val = parseInt(val) || 0;
            if (type === 'float') val = parseFloat(val) || 0;
            formData[key] = val;
        };
        window.updateFieldRender = (key, val, type = 'text') => {
            window.updateField(key, val, type);
            reRenderKeepScroll();
        };
        window.toggleArray = (key, item) => {
            const arr = formData[key];
            const index = arr.indexOf(item);
            if (index > -1) arr.splice(index, 1);
            else arr.push(item);
            reRenderKeepScroll();
        };
        window.toggleHistory = (show) => {
            state.showHistory = show;
            if (show) state.showSettings = false;
            renderApp();
            scrollToTop();
        };
        window.toggleSettings = (show) => {
            state.showSettings = show;
            if (show) state.showHistory = false;
            state.keyNote = '';
            renderApp();
            scrollToTop();
        };
        window.saveApiKey = () => {
            const el = document.getElementById('apiKeyInput');
            const val = el ? el.value.trim() : '';
            if (!val) { state.keyNote = '⚠ Masukkan API key terlebih dahulu.'; reRenderKeepScroll(); return; }
            safeStorage.set('rshb_anthropic_key', val);
            if (state.results) {
                state.showSettings = false;
                renderApp();
                rerunAnalysis();
            } else {
                state.keyNote = '✓ Kunci tersimpan. AI akan aktif pada analisis berikutnya.';
                reRenderKeepScroll();
            }
        };
        window.clearApiKey = () => {
            safeStorage.remove('rshb_anthropic_key');
            state.keyNote = 'Kunci dihapus dari perangkat ini.';
            reRenderKeepScroll();
        };
        window.rerunAnalysis = () => {
            const r = state.results;
            if (!r) return;
            getAIAnalysis({ bmi: r.bmi, ksprScore: r.kspr, ksprCategory: r.ksprCategory, plan: r.plan });
            setTimeout(scrollToHasil, 60);
        };

        function calculateBMI() {
            const tb = formData.tinggiBadan || 0;
            const bb = formData.beratBadanSebelum || 0;
            if (tb === 0) return 0;
            const heightM = tb / 100;
            return (bb / (heightM * heightM)).toFixed(1);
        }
        function getWeightGainRecommendation(bmi) {
            if (bmi < 18.5) return "12.5 - 18 kg (Underweight)";
            if (bmi >= 18.5 && bmi < 25) return "11.5 - 16 kg (Normal)";
            if (bmi >= 25 && bmi < 30) return "7 - 11.5 kg (Overweight)";
            return "5 - 9 kg (Obesitas)";
        }

        window.calculatePersonalizedPlan = () => {
            if (!formData.nama || !formData.nama.trim()) formData.nama = 'Bunda';

            const bmi = calculateBMI();
            const weightRec = getWeightGainRecommendation(bmi);

            let kspr = 2;
            let ksprDetails = ['Skor Awal Ibu Hamil (2)'];

            if (formData.usia <= 16) { kspr += 4; ksprDetails.push('Terlalu Muda (4)'); }
            if (formData.usia >= 35) { kspr += 4; ksprDetails.push('Terlalu Tua (4)'); }
            if (formData.jarakKehamilan >= 10 && formData.hamilKe > 1) { kspr += 4; ksprDetails.push('Terlalu Lama Jarak Kehamilan (4)'); }
            if (formData.jarakKehamilan < 2 && formData.jarakKehamilan > 0 && formData.hamilKe > 1) { kspr += 4; ksprDetails.push('Terlalu Cepat Jarak Kehamilan (4)'); }
            if (formData.hamilKe >= 4) { kspr += 4; ksprDetails.push('Terlalu Banyak Anak (4)'); }
            if (formData.tinggiBadan < 145 && formData.tinggiBadan > 0) { kspr += 4; ksprDetails.push('Terlalu Pendek (4)'); }

            if (formData.riwayatObstetri.includes('Keguguran')) { kspr += 4; ksprDetails.push('Pernah Gagal Hamil (4)'); }
            if (formData.riwayatObstetri.includes('Persalinan Sulit')) { kspr += 4; ksprDetails.push('Pernah Persalinan Sulit (4)'); }
            if (formData.riwayatObstetri.includes('Caesar')) { kspr += 8; ksprDetails.push('Pernah Caesar (8)'); }

            const penyakitAGO = ['Anemia', 'Malaria', 'TBC', 'Penyakit Jantung', 'Diabetes', 'Penyakit Menular Seksual'];
            penyakitAGO.forEach(p => {
                if (formData.kondisiMedis.includes(p)) { kspr += 4; ksprDetails.push(`Penyakit: ${p} (4)`); }
            });
            if (formData.kondisiMedis.includes('Bengkak Muka/Tungkai')) { kspr += 4; ksprDetails.push('Bengkak/Tensi Tinggi (4)'); }

            const janinAGO = ['Kembar', 'Ketuban Berlebih (Hidramnion)', 'Letak Sungsang/Lintang'];
            janinAGO.forEach(j => {
                if (formData.kondisiJanin.includes(j)) { kspr += 4; ksprDetails.push(`Kondisi Janin: ${j} (4)`); }
            });

            if (formData.kondisiMedis.includes('Perdarahan')) { kspr += 8; ksprDetails.push('Perdarahan Kehamilan (8)'); }
            if (formData.kondisiMedis.includes('Kejang / Preeklamsia Berat')) { kspr += 8; ksprDetails.push('Preeklamsia Berat/Kejang (8)'); }

            let ksprCategory = '';
            let ksprColor = '';
            if (kspr === 2) {
                ksprCategory = 'Kehamilan Risiko Rendah (KRR)';
                ksprColor = 'bg-green-100 text-green-700 border-green-500';
            } else if (kspr >= 6 && kspr <= 10) {
                ksprCategory = 'Kehamilan Risiko Tinggi (KRT)';
                ksprColor = 'bg-yellow-100 text-yellow-700 border-yellow-500';
            } else {
                ksprCategory = 'Kehamilan Risiko Sangat Tinggi (KRST)';
                ksprColor = 'bg-red-100 text-red-700 border-red-500';
            }

            const plan = { vitamins: [], recommendations: [], warnings: [] };

            if (formData.mingguKehamilan <= 12) {
                plan.vitamins.push({ name: 'Asam Folat (400mcg-800mcg)', reason: 'Sangat krusial untuk mencegah kelainan saraf tulang belakang janin di trimester pertama.' });
            } else {
                plan.vitamins.push({ name: 'Kalsium & Vitamin D3', reason: 'Mendukung pembentukan tulang bayi dan mencegah ibu osteoporosis.' });
            }

            if (formData.kondisiMedis.includes('Anemia')) {
                plan.vitamins.push({ name: 'Tablet Tambah Darah (Fe)', reason: 'Cegah risiko perdarahan persalinan dengan suplemen zat besi untuk mengatasi anemia.' });
            } else {
                plan.vitamins.push({ name: 'Multivitamin Prenatal', reason: 'Nutrisi pendukung keseimbangan gizi harian.' });
            }

            if (formData.riwayatKeluarga.includes('Kelainan Bawaan Keluarga')) {
                plan.recommendations.push('Disarankan melakukan skrining genetik/NIPT lanjutan karena ada riwayat kelainan bawaan pada keluarga.');
            }

            const activities = [];
            if (kspr > 2 || formData.kondisiMedis.includes('Perdarahan') || formData.kondisiMedis.includes('Kejang / Preeklamsia Berat')) {
                activities.push('Bed rest parsial atau kurangi aktivitas fisik berat. Hindari senam hamil untuk sementara waktu sampai mendapat izin dokter.');
            } else {
                if (formData.mingguKehamilan <= 12) {
                    activities.push('Jalan santai 15-20 menit sehari. Hindari aktivitas yang memicu detak jantung terlalu cepat.');
                    activities.push('Latihan pernapasan dan relaksasi ringan di rumah.');
                } else if (formData.mingguKehamilan > 12 && formData.mingguKehamilan <= 28) {
                    activities.push('Senam hamil ringan atau yoga prenatal 2-3 kali seminggu untuk kelenturan panggul.');
                    activities.push('Berenang santai untuk mengurangi beban punggung (opsional jika fasilitas tersedia).');
                } else {
                    activities.push('Jalan pagi teratur untuk mengoptimalkan posisi masuknya kepala janin ke panggul.');
                    activities.push('Senam kegel rutin untuk memperkuat otot dasar panggul persiapan persalinan.');
                }
            }
            plan.activities = activities;

            let usgConclusion = 'Hasil indikator USG menunjukkan perkembangan janin dalam batas normal sesuai usia kehamilan.';
            let isUsgAbnormal = false;
            let usgDetails = [];

            if (formData.hasilUsg !== 'Sesuai Usia Kehamilan') {
                isUsgAbnormal = true;
                usgDetails.push(`Kondisi posisi/ketuban: ${formData.hasilUsg}.`);
            }

            if (formData.mingguKehamilan <= 14 && (formData.usgNT || formData.usgDJJ)) {
                if (formData.usgNT && parseFloat(formData.usgNT) > 3.0) {
                    isUsgAbnormal = true;
                    usgDetails.push(`Penebalan Nuchal Translucency (NT: ${formData.usgNT} mm). Risiko kelainan bawaan/kromosom meningkat.`);
                }
                if (formData.usgDJJ) {
                    const djj = parseInt(formData.usgDJJ);
                    if (djj < 110 || djj > 160) {
                        isUsgAbnormal = true;
                        usgDetails.push(`Detak Jantung Janin (DJJ: ${djj} bpm) terdeteksi di luar batas normal (110-160 bpm).`);
                    }
                }
            }

            if (isUsgAbnormal) {
                usgConclusion = `⚠️ Ditemukan Catatan Medis pada USG: ${usgDetails.join(' ')} Disarankan untuk segera melakukan pemeriksaan lanjutan atau konsultasi dengan Dokter Spesialis Fetomaternal.`;
            }
            plan.usgConclusion = usgConclusion;
            plan.isUsgAbnormal = isUsgAbnormal;

            state.results = { bmi, weightRec, kspr, ksprDetails, ksprCategory, ksprColor, plan };
            state.aiAnalysis = null;
            state.aiError = false;
            renderApp();
            setTimeout(scrollToHasil, 60);

            getAIAnalysis({ bmi, ksprScore: kspr, ksprCategory, plan });
        };

        function extractJSON(text) {
            if (!text) return null;
            let t = String(text).trim();
            t = t.replace(/^```(?:json)?/i, '').replace(/```$/m, '').trim();
            const start = t.indexOf('{');
            const end = t.lastIndexOf('}');
            if (start === -1 || end === -1 || end < start) return null;
            try { return JSON.parse(t.slice(start, end + 1)); } catch (e) { return null; }
        }

        // ---- Asisten AI dr. Bayu analysis, powered by Claude ----
        async function getAIAnalysis(clinicalData) {
            state.isAnalyzing = true;
            state.aiError = false;
            reRenderKeepScroll();

            const systemPrompt = `Anda adalah Asisten AI dr. Bayu, asisten medis cerdas di dr. Bayu SpOG Personal Momscare yang ramah, empatik, dan paham obstetri.
Tugas Anda menganalisis data ibu hamil (BMI, skor risiko KSPR, hasil USG, kondisi klinis) dan memberi panduan yang menenangkan namun akurat.
Jawab HANYA dengan satu objek JSON valid, tanpa teks lain dan tanpa pembungkus markdown. Gunakan Bahasa Indonesia yang hangat dan ringkas.
Struktur:
{
  "summary": "Sapaan hangat 1-2 kalimat, perkenalkan diri sebagai Asisten AI dr. Bayu",
  "deepDive": "Analisis singkat (3-4 kalimat) tentang risiko, BMI, penyulit, dan makna hasil USG",
  "usgAnalysis": "Kesimpulan singkat khusus hasil USG (1-2 kalimat)",
  "mealPlan": ["Saran menu 1", "Saran menu 2", "Saran menu 3"],
  "mentalHealth": "Saran manajemen stres yang spesifik untuk pekerjaan & kondisinya (2-3 kalimat)",
  "activityPlan": ["Saran aktivitas/senam 1", "Saran aktivitas/senam 2"]
}`;

            const userQuery = `Data Pasien:
Nama: ${formData.nama}, Usia Kehamilan: ${formData.mingguKehamilan} minggu.
Fisik: Usia ${formData.usia} th, BMI Pra-hamil: ${clinicalData.bmi}, Kenaikan BB: ${formData.beratBadanSekarang - formData.beratBadanSebelum} kg.
Pekerjaan: ${formData.pekerjaan}, Stres: ${formData.stresPekerjaan}.
Skor Risiko KSPR: ${clinicalData.ksprScore} (Kategori: ${clinicalData.ksprCategory}).
Kondisi/Riwayat: ${[...formData.riwayatObstetri, ...formData.riwayatKeluarga, ...formData.kondisiMedis, ...formData.kondisiJanin].join(', ') || 'Tidak ada catatan khusus'}.
Klinis: Tekanan Darah ${formData.tekananDarah}, USG Umum: ${formData.hasilUsg}, USG Trimester 1 (CRL: ${formData.usgCRL || '-'} mm, NT: ${formData.usgNT || '-'} mm, DJJ: ${formData.usgDJJ || '-'} bpm).`;

            try {
                const _proxy = (typeof RAMLI_PROXY_URL === 'string' && RAMLI_PROXY_URL.trim()) ? RAMLI_PROXY_URL.trim() : '';
                const _endpoint = _proxy || "https://api.anthropic.com/v1/messages";
                const _headers = { "Content-Type": "application/json" };
                if (!_proxy) {
                    const _key = getStoredKey();
                    if (_key) {
                        _headers["x-api-key"] = _key;
                        _headers["anthropic-version"] = "2023-06-01";
                        _headers["anthropic-dangerous-direct-browser-access"] = "true";
                    }
                }
                const response = await fetch(_endpoint, {
                    method: "POST",
                    headers: _headers,
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: [{ role: "user", content: userQuery }]
                    })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
                const parsed = extractJSON(text);
                if (parsed) state.aiAnalysis = parsed;
                else state.aiError = true;
            } catch (error) {
                console.error("Asisten AI dr. Bayu analysis failed:", error);
                state.aiError = true;
            } finally {
                state.isAnalyzing = false;
                reRenderKeepScroll();
            }
        }

        // ---- Voice briefing via built-in speech engine ----
        let cachedVoices = [];
        function refreshVoices() {
            try { cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; } catch (e) { cachedVoices = []; }
        }
        if ('speechSynthesis' in window) {
            refreshVoices();
            window.speechSynthesis.onvoiceschanged = refreshVoices;
        }

        let voiceWatchdog = null;

        // Build the spoken briefing. Uses Asisten AI dr. Bayu's AI text when available,
        // otherwise composes one locally from the scoring results so the voice
        // still works on a plain static host (no AI needed).
        function buildBriefingText() {
            const r = state.results;
            const a = state.aiAnalysis;
            if (a) {
                return `Halo Bunda ${formData.nama}. Saya Asisten AI dr. Bayu dari dr. Bayu SpOG Personal Momscare. ${a.summary || ''} ${a.mentalHealth ? 'Untuk menjaga kesehatan Bunda dan si kecil, ' + a.mentalHealth : ''} Tetap sehat dan semangat ya Bunda!`;
            }
            if (!r) return '';
            let p = `Halo Bunda ${formData.nama}. Saya Asisten AI dr. Bayu dari dr. Bayu SpOG Personal Momscare. `;
            p += `Berdasarkan data Bunda, indeks risiko kehamilan saat ini ${r.kspr}, termasuk kategori ${r.ksprCategory}. `;
            p += `Status gizi pra-hamil Bunda dengan nilai BMI ${r.bmi}, dengan target kenaikan berat badan ${r.weightRec}. `;
            if (r.plan.isUsgAbnormal) {
                p += `Ada catatan pada hasil USG yang sebaiknya Bunda konsultasikan lebih lanjut dengan dokter spesialis. `;
            } else {
                p += `Hasil USG Bunda berada dalam batas normal sesuai usia kehamilan. `;
            }
            if (r.kspr > 2 || r.plan.isUsgAbnormal) {
                p += `Sebaiknya Bunda segera menjadwalkan kontrol dengan dokter spesialis kandungan di RS Harapan Bunda. `;
            }
            p += `Tetap sehat dan semangat ya Bunda!`;
            return p;
        }

        function speakChunks(chunks, idVoice, flags) {
            let i = 0;
            const next = () => {
                if (i >= chunks.length) { state.isSpeaking = false; reRenderKeepScroll(); return; }
                const part = chunks[i].trim();
                if (!part) { i++; next(); return; }
                const u = new SpeechSynthesisUtterance(part);
                u.lang = 'id-ID';
                u.rate = 0.98;
                u.pitch = 1.05;
                if (idVoice) u.voice = idVoice;
                u.onstart = () => { flags.started = true; };
                u.onend = () => { i++; next(); };
                u.onerror = () => { i++; next(); };
                window.speechSynthesis.speak(u);
            };
            next();
        }

        window.playVoiceBriefing = () => {
            if (!('speechSynthesis' in window)) {
                state.voiceNote = 'Perangkat/browser ini tidak mendukung suara otomatis. Silakan baca pesan Asisten AI dr. Bayu di layar ya, Bunda.';
                reRenderKeepScroll();
                return;
            }
            // Toggle off if already speaking.
            if (state.isSpeaking) {
                if (voiceWatchdog) clearTimeout(voiceWatchdog);
                window.speechSynthesis.cancel();
                state.isSpeaking = false;
                reRenderKeepScroll();
                return;
            }
            if (!state.results) return;

            window.speechSynthesis.cancel();
            const full = buildBriefingText();
            if (!full) return;
            // Split into sentence-sized chunks to avoid the long-utterance cutoff bug.
            const chunks = full.match(/[^.!?]+[.!?]*/g) || [full];

            if (!cachedVoices.length) refreshVoices();
            const idVoice = cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('id'));

            const flags = { started: false };
            state.isSpeaking = true;
            state.voiceNote = idVoice ? '' : 'Catatan: suara Bahasa Indonesia belum terpasang di perangkat ini, jadi pelafalan memakai suara default.';
            reRenderKeepScroll();

            speakChunks(chunks, idVoice, flags);

            // If nothing actually starts (common inside the in-chat preview sandbox), tell the user how to fix it.
            if (voiceWatchdog) clearTimeout(voiceWatchdog);
            voiceWatchdog = setTimeout(() => {
                if (!flags.started && !window.speechSynthesis.speaking && state.isSpeaking) {
                    window.speechSynthesis.cancel();
                    state.isSpeaking = false;
                    state.voiceNote = 'Suara tidak bisa diputar di tampilan ini (umumnya karena pratinjau di dalam chat). Buka atau host file HTML-nya langsung di browser HP/laptop agar suara Asisten AI dr. Bayu berfungsi.';
                    reRenderKeepScroll();
                }
            }, 900);

                    textArea.value = shareUrl;
                    textArea.style.position = "absolute"; textArea.style.left = "-9999px";

                    document.body.removeChild(textArea);

        <span id="fontLbl" class="text-[10px] text-slate-400 w-9 text-center tabular-nums select-none">100%</span>
        <button type="button" onclick="setFont(1)" aria-label="Perbesar huruf" title="Perbesar huruf" class="w-9 h-9 rounded-full hover:bg-slate-100 text-slate-800 flex items-center justify-center"><span class="text-lg font-black leading-none">A</span></button>
    </div>
    <script>
    (function(){
        var KEY='ramli_font_scale', STEPS=[90,100,112,125,140,160];
        function idx(){var v;try{v=parseInt(localStorage.getItem(KEY),10);}catch(e){}var i=STEPS.indexOf(v);return i<0?1:i;}
        function apply(i){var p=STEPS[i];document.documentElement.style.fontSize=p+'%';var l=document.getElementById('fontLbl');if(l)l.textContent=p+'%';}
        window.setFont=function(d){var i=Math.max(0,Math.min(STEPS.length-1,idx()+d));try{localStorage.setItem(KEY,STEPS[i]);}catch(e){}apply(i);};
        apply(idx());
    })();
    </script>
