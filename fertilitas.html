                ${q && totalHit === 0 ? `<div class="text-center text-slate-400 py-10"><i class="fa-solid fa-magnifying-glass text-2xl mb-2 block"></i>Tidak ada panduan cocok dengan "${state.search}".</div>` : ''}
                ${cats.map(catKey => {
                    const cat = KATEGORI[catKey];
                    const list = KONDISI.filter(k => k.kategori === catKey).filter(match);
                    if (!list.length) return '';
                    return `
                    <div class="mb-5">
                        <div class="flex items-center gap-2 mb-2 px-1">
                            <i class="fa-solid ${cat.ikon} text-${cat.warna}-500"></i>
                            <h2 class="font-bold text-slate-700 text-sm uppercase tracking-wide">${cat.label}</h2>
                            <span class="text-xs text-slate-400">(${list.length})</span>
                        </div>
                        <div class="space-y-2">
                            ${list.map(k => `
                            <button onclick="go('kondisi','${k.id}')" class="w-full text-left bg-white rounded-xl p-3.5 border border-slate-100 shadow-sm hover:shadow-md hover:border-${cat.warna}-200 transition-all flex items-center gap-3">
                                <div class="w-11 h-11 rounded-lg bg-${cat.warna}-50 flex items-center justify-center shrink-0">
                                    <i class="fa-solid ${cat.ikon} text-${cat.warna}-500"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-slate-800 text-[15px]">${k.nama}</div>
                                    <div class="text-xs text-slate-500 truncate">${k.ringkas || ''}</div>
                                </div>
                                <i class="fa-solid fa-chevron-right text-slate-300 text-sm"></i>
                            </button>`).join('')}
                        </div>
                    </div>`;
                }).join('')}
            </div>`;
        }

        // ---------- Detail ----------
        function renderKondisiDetail() {
            const k = KONDISI.find(x => x.id === state.kondisiId);
            if (!k) return renderHome();
            const cat = KATEGORI[k.kategori] || { label: '', warna: 'violet' };
            return `
            <div class="fade-up">
                <button onclick="go('home')" class="text-slate-500 text-sm mb-3 flex items-center gap-1.5 no-print"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-5 mb-4">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-${cat.warna}-100 text-${cat.warna}-700">${cat.label}</span>
                        <span class="text-[10px] text-slate-400 ml-auto">PPK Obgyn RSHS 2015${k.hal ? ' · hal. ' + k.hal : ''}</span>
                    </div>
                    <h1 class="font-extrabold text-xl text-slate-800">${k.nama}</h1>
                    ${k.definisi ? `<p class="text-sm text-slate-600 mt-2 leading-relaxed">${k.definisi}</p>` : ''}
                </div>

                ${arr(k.diagnosis) ? sectionCard('fa-stethoscope', 'purple', 'Diagnosis / Kriteria',
                    `<ul class="space-y-1.5">${k.diagnosis.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-purple-400"></i><span>${d}</span></li>`).join('')}</ul>`) : ''}

                ${arr(k.penunjang) ? sectionCard('fa-flask', 'teal', 'Pemeriksaan Penunjang',
                    `<ul class="space-y-1.5">${k.penunjang.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-teal-400"></i><span>${d}</span></li>`).join('')}</ul>`) : ''}

                ${arr(k.langkah) ? sectionCard('fa-list-ol', 'violet', 'Tatalaksana / Langkah',
                    `<ol class="space-y-2">${k.langkah.map((s, i) => `<li class="flex gap-3 text-sm text-slate-700"><span class="w-6 h-6 rounded-md bg-violet-100 text-violet-600 font-bold text-xs flex items-center justify-center shrink-0">${i + 1}</span><span class="leading-snug">${s}</span></li>`).join('')}</ol>`) : ''}

                ${k.obat && k.obat.length ? sectionCard('fa-pills', 'blue', 'Obat & Dosis',
                    `<div class="space-y-2">${k.obat.map(o => `<div class="bg-blue-50 rounded-lg p-3">
                        <div class="font-bold text-blue-800 text-sm">${o.n}</div>
                        <div class="text-sm text-slate-700 mt-0.5">${o.d || ''}</div>
                        ${o.c ? `<div class="text-xs text-blue-600 mt-0.5"><i class="fa-solid fa-syringe mr-1"></i>${o.c}</div>` : ''}
                    </div>`).join('')}</div>`) : ''}

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    ${arr(k.penyulit) ? sectionCard('fa-triangle-exclamation', 'amber', 'Penyulit',
                        `<div class="flex flex-wrap gap-1.5">${k.penyulit.map(p => `<span class="px-2 py-1 rounded-md bg-amber-50 text-amber-700 text-xs font-medium">${p}</span>`).join('')}</div>`) : ''}
                    ${arr(k.rujukan) ? sectionCard('fa-hospital-user', 'rose', 'Konsultasi / Rujukan',
                        `<div class="flex flex-wrap gap-1.5">${k.rujukan.map(p => `<span class="px-2 py-1 rounded-md bg-rose-50 text-rose-700 text-xs font-medium">${p}</span>`).join('')}</div>`) : ''}
                </div>

                <div class="flex gap-2 mt-4 no-print">
                    <button onclick="startTanyaFrom('${k.id}')" class="flex-1 bg-slate-800 text-white rounded-xl py-3 font-semibold text-sm flex items-center justify-center gap-2"><i class="fa-solid fa-robot"></i> Tanya Asisten AI dr. Bayu</button>
                    <button onclick="window.print()" class="px-4 bg-white border border-slate-200 text-slate-600 rounded-xl py-3 font-semibold text-sm"><i class="fa-solid fa-print"></i></button>
                </div>
            </div>`;
        }
        function arr(x) { return Array.isArray(x) && x.length; }
        function sectionCard(icon, color, title, inner) {
            return `<div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-3">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-7 h-7 rounded-lg bg-${color}-50 flex items-center justify-center"><i class="fa-solid ${icon} text-${color}-500 text-sm"></i></div>
                    <h3 class="font-bold text-slate-700 text-sm">${title}</h3>
                </div>${inner}</div>`;
        }
        window.startTanyaFrom = (id) => {
            const k = KONDISI.find(x => x.id === id);
            state.tanyaKondisi = k ? k.nama : '';
            go('tanya');
        };

        // ---------- Tanya Asisten AI dr. Bayu (AI) ----------
        function renderTanya() {
            const opts = KONDISI.map(k => `<option value="${k.nama}" ${state.tanyaKondisi === k.nama ? 'selected' : ''}>${k.nama}</option>`).join('');
            return `
            <div class="fade-up">
                <div class="rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 text-white p-5 mb-4">
                    <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-robot"></i><h1 class="font-extrabold text-lg">Tanya Asisten AI dr. Bayu</h1></div>
                    <p class="text-slate-300 text-sm">Tanyakan hal seputar fertilitas / kesuburan. Asisten AI dr. Bayu menjawab berbasis protap PPK RSHS 2015. <b>Bukan pengganti penilaian klinis.</b></p>
                </div>
                <div class="rounded-2xl bg-white border border-slate-100 shadow-sm p-4 mb-4">
                    <label class="text-sm font-semibold text-slate-600">Topik terkait (opsional)</label>
                    <select onchange="setTanyaKondisi(this.value)" class="w-full mt-1 mb-3 px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-violet-400 bg-white">
                        <option value="">— Umum / biarkan Asisten AI dr. Bayu menilai —</option>${opts}
                    </select>
                    <label class="text-sm font-semibold text-slate-600">Pertanyaan Anda</label>
                    <textarea id="tanyaInput" oninput="setTanyaInput(this.value)" rows="4" placeholder="Contoh: Kriteria diagnosis PCOS? Tatalaksana lini pertama anovulasi? Kapan rujuk infertilitas?" class="w-full mt-1 px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-violet-400 text-sm">${state.tanyaInput}</textarea>
                    <button onclick="runTanya()" ${state.tanyaLoading ? 'disabled' : ''} class="w-full mt-3 bg-violet-600 hover:bg-violet-700 disabled:opacity-60 text-white rounded-xl py-3 font-bold flex items-center justify-center gap-2">
                        ${state.tanyaLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> Asisten AI dr. Bayu menjawab...' : '<i class="fa-solid fa-paper-plane"></i> Tanyakan'}
                    </button>
                </div>
                ${state.tanyaError ? `<div class="rounded-2xl bg-amber-50 border border-amber-200 p-4 text-sm text-amber-900 mb-4"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Asisten AI dr. Bayu belum aktif atau gagal terhubung. Panduan & pencarian tetap bisa dipakai offline. Untuk mengaktifkan AI, isi API key via ⚙ atau pastikan proxy terhubung.</div>` : ''}
                ${state.tanyaResult ? renderTanyaResult(state.tanyaResult) : ''}
            </div>`;
        }
        window.setTanyaInput = (v) => { state.tanyaInput = v; };
        window.setTanyaKondisi = (v) => { state.tanyaKondisi = v; };
        function renderTanyaResult(r) {
            return `
            <div class="fade-up space-y-3">
                ${r.ringkasan ? `<div class="rounded-2xl bg-violet-50 border border-violet-200 p-4"><div class="text-xs font-bold text-violet-600 uppercase tracking-wide">Jawaban</div><p class="text-sm text-slate-700 mt-1 leading-relaxed">${r.ringkasan}</p></div>` : ''}
                ${Array.isArray(r.poin) && r.poin.length ? sectionCard('fa-list-check', 'purple', 'Poin Penting',
                    `<ul class="space-y-1.5">${r.poin.map(d => `<li class="flex gap-2 text-sm text-slate-700"><i class="fa-solid fa-circle text-[5px] mt-2 text-purple-400"></i><span>${d}</span></li>`).join('')}</ul>`) : ''}
                ${Array.isArray(r.langkah) && r.langkah.length ? sectionCard('fa-list-ol', 'violet', 'Langkah',
                    `<ol class="space-y-2">${r.langkah.map((s, i) => `<li class="flex gap-3 text-sm text-slate-700"><span class="w-6 h-6 rounded-md bg-violet-100 text-violet-600 font-bold text-xs flex items-center justify-center shrink-0">${i + 1}</span><span>${s}</span></li>`).join('')}</ol>`) : ''}
                ${r.catatan ? sectionCard('fa-circle-info', 'amber', 'Catatan / Rujukan', `<p class="text-sm text-slate-700">${r.catatan}</p>`) : ''}
                <div class="text-[11px] text-slate-400 px-1">Jawaban AI berbasis PPK Obgyn RSHS 2015. Selalu konfirmasi dengan DPJP / penilaian klinis langsung.</div>
            </div>`;
        }
        function extractJSON(text) {
            if (!text) return null;
            let s = text.indexOf('{'), e = text.lastIndexOf('}');
            if (s === -1 || e === -1 || e < s) return null;
            try { return JSON.parse(text.slice(s, e + 1)); } catch (err) { return null; }
        }
        window.runTanya = async () => {
            if (!state.tanyaInput.trim()) return;
            state.tanyaLoading = true; state.tanyaError = false; state.tanyaResult = null; reRender();
            const ref = state.tanyaKondisi ? KONDISI.find(k => k.nama === state.tanyaKondisi) : null;
            const konteks = ref ? `\n\nProtap acuan (${ref.nama}):\nDefinisi: ${ref.definisi || '-'}\nDiagnosis: ${(ref.diagnosis || []).join(' | ')}\nTatalaksana: ${(ref.langkah || []).join(' | ')}\nObat: ${(ref.obat || []).map(o => o.n + ' ' + (o.d || '')).join(' | ')}` : '';
            const systemPrompt = `Anda Asisten AI dr. Bayu, asisten fertilitas & endokrinologi reproduksi untuk TENAGA KESEHATAN. Konten berbasis Panduan Praktik Klinis (PPK) Obstetri & Ginekologi RSUP Dr. Hasan Sadikin Bandung 2015. Jawab HANYA dengan satu objek JSON valid tanpa teks lain, tanpa markdown. Bahasa Indonesia, ringkas, akurat, dan aman. Jangan mengarang dosis di luar protap; bila di luar cakupan protap, sebutkan dan sarankan konsultasi.
Struktur:
{
  "ringkasan": "jawaban utama 1-3 kalimat",
  "poin": ["poin penting", "..."],
  "langkah": ["langkah bila relevan (boleh kosong)"],
  "catatan": "catatan / kapan konsultasi atau rujuk"
}`;
            const userQuery = `Pertanyaan: ${state.tanyaInput}${state.tanyaKondisi ? `\nTopik: ${state.tanyaKondisi}` : ''}${konteks}`;
            try {
                const _proxy = (typeof RAMLI_PROXY_URL === 'string' && RAMLI_PROXY_URL.trim()) ? RAMLI_PROXY_URL.trim() : '';
                const _endpoint = _proxy || "https://api.anthropic.com/v1/messages";
                const _headers = { "Content-Type": "application/json" };
                if (!_proxy) {
                    const _key = getStoredKey();
                    if (_key) { _headers["x-api-key"] = _key; _headers["anthropic-version"] = "2023-06-01"; _headers["anthropic-dangerous-direct-browser-access"] = "true"; }
                }
                const res = await fetch(_endpoint, {
                    method: "POST", headers: _headers,
                    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1100, system: systemPrompt, messages: [{ role: "user", content: userQuery }] })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
                const parsed = extractJSON(text);
                if (parsed) state.tanyaResult = parsed; else state.tanyaError = true;
            } catch (e) {
                console.error('Tanya gagal:', e); state.tanyaError = true;
            } finally {
                state.tanyaLoading = false; reRender();
            }
        };

        // ---------- Settings (API key) ----------
        function toggleSettings() { state.showSettings = !state.showSettings; renderApp(); }
        window.toggleSettings = toggleSettings;
        function renderSettings() {
            const hasProxy = (typeof RAMLI_PROXY_URL === 'string' && RAMLI_PROXY_URL.trim());
            const key = getStoredKey();
            return `
            <div class="fixed inset-0 z-40 bg-black/40 flex items-end sm:items-center justify-center p-4 no-print" onclick="if(event.target===this)toggleSettings()">
                <div class="bg-white rounded-2xl w-full max-w-md p-5 fade-up">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-robot text-violet-500"></i> Pengaturan Asisten AI dr. Bayu</h3>
                        <button onclick="toggleSettings()" class="text-slate-400"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    ${hasProxy ? `<div class="bg-green-50 text-green-800 text-sm rounded-lg p-3 mb-3"><i class="fa-solid fa-circle-check mr-1"></i> AI aktif via proxy — siap dipakai semua pengunjung tanpa API key.</div>` : `
                    <p class="text-sm text-slate-600 mb-2">Masukkan Anthropic API key (disimpan lokal di perangkat ini saja) untuk mengaktifkan Tanya AI.</p>
                    <input id="apiKeyInput" type="password" value="${key}" placeholder="sk-ant-..." class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-violet-400 text-sm mb-2">
                    <div class="flex gap-2">
                        <button onclick="saveKey()" class="flex-1 bg-violet-600 text-white rounded-lg py-2.5 font-semibold text-sm">Simpan</button>
                        <button onclick="clearKey()" class="px-4 bg-slate-100 text-slate-600 rounded-lg py-2.5 font-semibold text-sm">Hapus</button>
                    </div>`}
                    ${state.keyNote ? `<div class="text-xs text-green-600 mt-2">${state.keyNote}</div>` : ''}
                    <div class="text-[11px] text-slate-400 mt-3 border-t border-slate-100 pt-3">Panduan & pencarian tetap berfungsi penuh tanpa AI.</div>
                </div>
            </div>`;
        }
        window.saveKey = () => { const v = document.getElementById('apiKeyInput').value.trim(); if (v) { safeStorage.set('ramli_anthropic_key', v); state.keyNote = 'API key tersimpan.'; renderApp(); } };
        window.clearKey = () => { safeStorage.remove('ramli_anthropic_key'); state.keyNote = 'API key dihapus.'; renderApp(); };

        // ---------- Disclaimer ----------
        function renderDisclaimer() {
            return `<div class="max-w-3xl mx-auto px-4 pb-24 -mt-2">
                <div class="rounded-xl bg-slate-100 border border-slate-200 p-3 text-[11px] text-slate-500 leading-relaxed">
                    <b class="text-slate-600"><i class="fa-solid fa-circle-info"></i> Disclaimer:</b> Alat bantu edukasi/keputusan klinis untuk tenaga kesehatan, berbasis Panduan Praktik Klinis (PPK) Obstetri & Ginekologi RSUP Dr. Hasan Sadikin Bandung 2015. BUKAN pengganti penilaian klinis, pemeriksaan langsung, atau kebijakan/protap institusi Anda.
                </div>
            </div>`;
        }

        renderApp();
    </script>
</body>
</html>
